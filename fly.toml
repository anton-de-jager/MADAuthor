# fly.toml — Fly.io configuration for MADAuthor (API + SPA in one image)
# Generate from this file with `flyctl launch --no-deploy --copy-config` if needed.

app = "madauthor"
primary_region = "jnb"     # Johannesburg — close to the SQL Server at 41.185.13.202

[build]
  dockerfile = "Dockerfile"

[env]
  ASPNETCORE_URLS = "http://+:8080"
  ASPNETCORE_ENVIRONMENT = "Production"
  STORAGE_LOCAL_ROOT = "/app/storage"
  # The connection string and secret keys come from `fly secrets set …` — never in this file.

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0
  processes = ["app"]

  [[http_service.checks]]
    grace_period = "30s"
    interval = "30s"
    method = "GET"
    timeout = "5s"
    path = "/api/health/live"

# 512 MB is comfortable for .NET 8 ASP.NET Core + Angular static files.
# Drop to 256 MB if you want absolute minimum cost; bump to 1 GB if export rendering is slow.
[[vm]]
  cpu_kind = "shared"
  cpus = 1
  memory_mb = 512

# Persistent file storage for uploads, generated covers, and rendered exports.
# Without this, redeploys lose every file because containers are immutable.
[[mounts]]
  source = "madauthor_storage"
  destination = "/app/storage"
  initial_size = "3gb"     # Fly free tier includes 3 GB total across volumes.
